name: ReaderPro
options:
  bundleIdPrefix: com.readerpro
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  minimumXcodeGenVersion: "2.30"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.19"
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    from: "1.20.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ReaderPro:
    type: application
    platform: macOS
    sources:
      - path: ReaderPro/App
        excludes:
          - "**/*.md"
      - path: ReaderPro/Domain
        excludes:
          - "**/*.md"
      - path: ReaderPro/Application
        excludes:
          - "**/*.md"
      - path: ReaderPro/Infrastructure
        excludes:
          - "**/*.md"
      - path: ReaderPro/UI
        excludes:
          - "**/*.md"
      - path: ReaderPro/Resources
    dependencies:
      - package: ZIPFoundation
      - package: onnxruntime
        product: onnxruntime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.readerpro.ReaderPro
        PRODUCT_NAME: ReaderPro
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ENABLE_APP_SANDBOX: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: ReaderPro/ReaderPro.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true

  ReaderProTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ReaderPro/Tests
    dependencies:
      - target: ReaderPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.readerpro.ReaderProTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ReaderPro.app/Contents/MacOS/ReaderPro"
        BUNDLE_LOADER: "$(TEST_HOST)"
